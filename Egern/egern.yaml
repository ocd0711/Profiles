      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png
      hidden: false
  - smart:
      name: Emby
      policies:
        - Subscription
      flatten: true
      filter: ^(?!.*(Gamer|香港|日本|美国|HK|JP|US)).*$
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/StreamingSE.png
      hidden: false
  - auto_test:
      name: AutoTest
      policies:
        - Subscription
      flatten: true
      filter: ^(?!.*(Gamer|arm|emby)).*$
      interval: 600
      tolerance: 100
      timeout: 3
      icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
      hidden: true
  - external:
      name: Subscription
      type: select
      urls:
        - https://your-subscription-url
      filter: ^((?!Remain|Expired|官网|如需|套餐|去除|剩余|距离|Reset|重置|流量).)+$
      update_interval: 86400
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/airport.png
      hidden: false
