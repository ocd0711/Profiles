compat_route: false
dns:
  bootstrap:
  - 223.5.5.5
  - 119.29.29.29
  - 1.12.12.12
  - 120.53.53.53
  - 2400:3200::1
  upstreams:
    AdBlack:
    - quic://dns.adguard-dns.com
    - https://dns.adguard-dns.com/dns-query
    Alibaba:
    - 223.5.5.5
    - https://dns.alidns.com/dns-query
    Tencent:
    - 119.29.29.29
    - https://doh.pub/dns-query
    ByteDance:
    - 180.184.2.2
    - 180.184.1.1
    China:
    - 223.5.5.5
    - 119.29.29.29
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    Global:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/reject.txt
      value: AdBlack
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Alibaba.lsr
      value: Alibaba
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Tencent.lsr
      value: Tencent
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/DouYin.lsr
      value: ByteDance
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Apple.lsr
      value: China
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/ChinaMax.lsr
      value: China
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Global.lsr
      value: Global
  - domain_wildcard:
      match: '*'
      value: Global
  proxy_nameservers:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  public_ip_lookup_url: https://ifconfig.me/ip
policy_groups:
- external:
    name: AllServer
    type: select
    urls:
    - https://your-subscription-url
    filter: ^((?!Remain|Expired|官网|如需|套餐|去除|剩余|距离|Reset|重置|流量).)+$
    update_interval: 86400
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/airport.png
    hidden: false
- smart:
    name: HK
    policies:
    - AllServer
    flatten: true
    filter: (?=.*(香港|HK|🇭🇰))^((?!(Gamer|emby)).)*$
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png
    hidden: false
- smart:
